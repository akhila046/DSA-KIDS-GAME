<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Background circle -->
  <circle cx="32" cy="32" r="32" fill="#6C63FF"/>
  
  <!-- Inner white circle -->
  <circle cx="32" cy="32" r="26" fill="#ffffff" opacity="0.15"/>

  <!-- Game controller body -->
  <rect x="14" y="22" width="36" height="22" rx="11" ry="11" fill="#ffffff"/>

  <!-- D-pad left/right -->
  <rect x="18" y="30" width="10" height="4" rx="2" fill="#6C63FF"/>
  <!-- D-pad up/down -->
  <rect x="21" y="27" width="4" height="10" rx="2" fill="#6C63FF"/>

  <!-- Buttons -->
  <circle cx="42" cy="29" r="2.5" fill="#FF6584"/>
  <circle cx="47" cy="33" r="2.5" fill="#43E97B"/>
  <circle cx="42" cy="37" r="2.5" fill="#F9C74F"/>
  <circle cx="37" cy="33" r="2.5" fill="#4CC9F0"/>

  <!-- Cable left -->
  <path d="M20 44 Q16 52 12 52" stroke="#ffffff" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Cable right -->
  <path d="M44 44 Q48 52 52 52" stroke="#ffffff" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- Start/select buttons -->
  <rect x="28" y="31" width="4" height="2.5" rx="1.2" fill="#6C63FF" opacity="0.6"/>
  <rect x="33" y="31" width="4" height="2.5" rx="1.2" fill="#6C63FF" opacity="0.6"/>
</svg>
